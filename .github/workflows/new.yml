name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main 
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate and Commit Keystore
        run: |
          if [ ! -f keystore.jks ]; then
            keytool -genkey -v \
              -keystore keystore.jks \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias release \
              -storepass saqoah \
              -keypass saqoah \
              -dname "CN=Samsung AdBlock, OU=Development, O=Example, L=City, ST=State, C=US"
            
            # Configure Git
            git config --global user.email "actions@github.com"
            git config --global user.name "GitHub Actions"
            
            # Commit and push the keystore
            git add keystore.jks
            git commit -m "Add generated signing keystore"
            git push origin main
          else
            echo "Keystore already exists in repository"
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          tag_name: v${{ github.run_number }}
          name: R0.${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 1